<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algebra — Sacha's 11+ Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1207;
    --cream: #faf6ee;
    --gold: #d4920a;
    --gold-light: #f5e3b0;
    --green: #1d7a4a;
    --green-light: #d4f0e2;
    --red: #c0392b;
    --red-light: #fde8e6;
    --blue: #1a4f8a;
    --blue-light: #ddeaf8;
    --purple: #6b2f9e;
    --purple-light: #efe0ff;
    --border: #d6c9a8;
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Plus Jakarta Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--ink); font-family: var(--sans); min-height: 100vh; }

  header {
    background: var(--ink);
    color: var(--cream);
    padding: 2rem 2.5rem 1.5rem;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  header h1 { font-family: var(--serif); font-size: clamp(1.8rem,4vw,2.8rem); font-weight: 900; line-height: 1; letter-spacing: -0.02em; }
  header h1 span { color: var(--gold); }
  .badge { background: var(--gold); color: var(--ink); font-family: var(--mono); font-size: 0.7rem; font-weight: 500; padding: 0.3rem 0.7rem; border-radius: 2px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }

  nav { background: #f0e8d8; border-bottom: 2px solid var(--border); padding: 0 2rem; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn { background: none; border: none; border-bottom: 3px solid transparent; padding: 1rem 1.1rem; font-family: var(--sans); font-size: 0.82rem; font-weight: 600; color: #7a6a4a; cursor: pointer; white-space: nowrap; transition: color .15s, border-color .15s; }
  .nav-btn:hover { color: var(--ink); }
  .nav-btn.active { color: var(--ink); border-bottom-color: var(--gold); }
  .nav-btn.done::after { content: ' ✓'; color: var(--green); }

  main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* ── OVERVIEW ── */
  .overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-top: 1rem; }
  .topic-card {
    border: 1.5px solid var(--border); border-radius: 10px; padding: 1.2rem 1.3rem;
    cursor: pointer; background: white; transition: border-color .2s, box-shadow .2s; position: relative;
  }
  .topic-card:hover { border-color: var(--gold); box-shadow: 0 4px 16px rgba(212,146,10,.12); }
  .topic-card.done { border-color: var(--green); }
  .topic-card .t-icon { font-size: 1.8rem; margin-bottom: 0.5rem; display: block; }
  .topic-card h3 { font-family: var(--serif); font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
  .topic-card p { font-size: 0.78rem; color: #7a6a4a; line-height: 1.4; }
  .done-pill { position: absolute; top: 0.7rem; right: 0.7rem; background: var(--green-light); color: var(--green); font-size: 0.68rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 20px; }

  /* ── LESSON ── */
  .lesson { display: none; }
  .lesson.active { display: block; }
  .lesson-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .back-btn { background: none; border: 1.5px solid var(--border); border-radius: 6px; padding: 0.4rem 0.9rem; font-family: var(--sans); font-size: 0.82rem; font-weight: 600; cursor: pointer; color: var(--ink); transition: border-color .15s; }
  .back-btn:hover { border-color: var(--gold); }
  .lesson-header h2 { font-family: var(--serif); font-size: 1.5rem; font-weight: 900; }

  .learn-box { background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .learn-box h3 { font-family: var(--serif); font-size: 1.1rem; font-weight: 700; margin-bottom: 0.8rem; color: var(--blue); }
  .learn-box p, .learn-box li { font-size: 0.9rem; line-height: 1.7; margin-bottom: 0.5rem; }
  .learn-box ul, .learn-box ol { padding-left: 1.3rem; }
  .formula-box { background: var(--gold-light); border: 1.5px solid var(--gold); border-radius: 8px; padding: 0.8rem 1.1rem; margin: 0.8rem 0; font-family: var(--mono); font-size: 0.95rem; font-weight: 500; color: var(--ink); }
  .example-box { background: var(--blue-light); border-left: 4px solid var(--blue); border-radius: 0 8px 8px 0; padding: 0.8rem 1.1rem; margin: 0.8rem 0; }
  .example-box .ex-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); margin-bottom: 0.3rem; }
  .example-box p { font-size: 0.88rem; line-height: 1.6; }
  .watch-out { background: #fff8e1; border-left: 4px solid var(--gold); border-radius: 0 8px 8px 0; padding: 0.7rem 1rem; margin: 0.8rem 0; font-size: 0.85rem; }
  .watch-out strong { color: var(--gold); }

  /* ── QUIZ ── */
  .quiz-section { margin-top: 1.5rem; }
  .quiz-section h3 { font-family: var(--serif); font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
  .question { background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 1.2rem 1.3rem; margin-bottom: 1rem; }
  .q-text { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.8rem; line-height: 1.5; }
  .q-text .math { font-family: var(--mono); background: #f0e8d8; padding: 0.1rem 0.4rem; border-radius: 3px; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .opt-btn {
    background: #f9f5ec; border: 1.5px solid var(--border); border-radius: 7px;
    padding: 0.6rem 0.9rem; font-family: var(--sans); font-size: 0.88rem; font-weight: 500;
    cursor: pointer; text-align: left; transition: border-color .15s, background .15s; line-height: 1.4;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--gold); background: var(--gold-light); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 700; }
  .opt-btn.wrong { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .opt-btn.reveal { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 700; }
  .feedback { display: none; margin-top: 0.8rem; padding: 0.7rem 1rem; border-radius: 7px; font-size: 0.85rem; line-height: 1.5; }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: var(--green-light); color: var(--green); }
  .feedback.wrong-fb { background: var(--red-light); color: var(--red); }
  .hint-area { display: none; margin-top: 0.6rem; padding: 0.7rem 1rem; background: var(--purple-light); border-radius: 7px; font-size: 0.85rem; line-height: 1.5; color: var(--purple); }
  .hint-area.show { display: block; }
  .hint-btn { background: none; border: 1px dashed var(--purple); color: var(--purple); border-radius: 5px; padding: 0.3rem 0.7rem; font-size: 0.78rem; cursor: pointer; margin-top: 0.5rem; font-family: var(--sans); }
  .hint-btn:disabled { opacity: 0.5; cursor: default; }

  .score-box { display: none; background: var(--gold-light); border: 2px solid var(--gold); border-radius: 10px; padding: 1.3rem; text-align: center; margin-top: 1rem; }
  .score-box.show { display: block; }
  .score-num { font-family: var(--serif); font-size: 2.5rem; font-weight: 900; color: var(--gold); }
  .score-msg { font-size: 0.9rem; margin: 0.4rem 0 1rem; }
  .score-actions { display: flex; gap: 0.7rem; justify-content: center; flex-wrap: wrap; }

  .btn { background: var(--ink); color: var(--cream); border: none; border-radius: 7px; padding: 0.65rem 1.3rem; font-family: var(--sans); font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: 0.85; }
  .btn.outline { background: none; color: var(--ink); border: 1.5px solid var(--border); }
  .btn.outline:hover { border-color: var(--gold); }
  .btn.gold { background: var(--gold); color: var(--ink); }

  .progress-bar-wrap { background: #e8dcc8; border-radius: 20px; height: 6px; margin: 0.5rem 0 0.2rem; }
  .progress-bar { background: var(--gold); border-radius: 20px; height: 6px; transition: width .4s; }
  .progress-label { font-size: 0.75rem; color: #7a6a4a; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--purple); border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .options { grid-template-columns: 1fr; }
    main { padding: 1.2rem 1rem; }
    header { padding: 1.5rem 1.2rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Sacha's 11+ Prep<br><span>Algebra</span></h1>
  </div>
  <span class="badge">City of London · Westminster</span>
</header>

<nav id="main-nav">
  <button class="nav-btn active" onclick="showOverview()">📋 Overview</button>
  <button class="nav-btn" id="nav-0" onclick="openTopic(0)">Formulae</button>
  <button class="nav-btn" id="nav-1" onclick="openTopic(1)">Sequences</button>
  <button class="nav-btn" id="nav-2" onclick="openTopic(2)">Missing Numbers</button>
  <button class="nav-btn" id="nav-3" onclick="openTopic(3)">Two Unknowns</button>
  <button class="nav-btn" id="nav-4" onclick="openTopic(4)">Combinations</button>
</nav>

<main>

  <!-- OVERVIEW -->
  <div id="overview">
    <p style="color:#7a6a4a; font-size:0.88rem; margin-bottom:1rem;">Work through all five topics to master algebra for the 11+.</p>
    <div style="margin-bottom:0.5rem;">
      <div class="progress-bar-wrap"><div class="progress-bar" id="overall-progress" style="width:0%"></div></div>
      <div class="progress-label" id="overall-label">0 of 5 topics complete</div>
    </div>
    <div class="overview-grid" id="topic-grid"></div>
  </div>

  <!-- LESSONS -->
  <div id="lessons"></div>

</main>

<script>
const TOPICS = [
  {
    id: 0,
    icon: '🧮',
    title: 'Simple Formulae',
    desc: 'Use letters to represent unknown numbers and substitute values.',
    learn: `
      <h3>What is a formula?</h3>
      <p>A <strong>formula</strong> uses letters (called <strong>variables</strong>) to show a rule. Instead of writing "double the number then add 3" every time, we write:</p>
      <div class="formula-box">y = 2x + 3</div>
      <p>Here <strong>x</strong> is the input and <strong>y</strong> is the result. We <strong>substitute</strong> a value in place of the letter.</p>

      <div class="example-box">
        <div class="ex-label">Example 1</div>
        <p>If y = 2x + 3, find y when x = 5.<br>
        → y = 2 × 5 + 3 = 10 + 3 = <strong>13</strong></p>
      </div>

      <div class="example-box">
        <div class="ex-label">Example 2</div>
        <p>The formula for the perimeter of a rectangle is P = 2(l + w).<br>
        Find P when l = 7 and w = 4.<br>
        → P = 2(7 + 4) = 2 × 11 = <strong>22</strong></p>
      </div>

      <h3 style="margin-top:1rem;">Order matters!</h3>
      <p>Always follow BODMAS: Brackets → Division/Multiplication → Addition/Subtraction.</p>
      <div class="formula-box">y = 3x² means: square x first, then multiply by 3</div>

      <div class="example-box">
        <div class="ex-label">Example 3</div>
        <p>Find y = 3x² when x = 4.<br>
        → y = 3 × (4²) = 3 × 16 = <strong>48</strong></p>
      </div>

      <div class="watch-out">
        <strong>⚠ Watch out:</strong> 3x² is NOT the same as (3x)². Always square first, then multiply.
      </div>
    `,
    questions: [
      {
        q: 'If y = 4x − 1, what is y when x = 6?',
        opts: ['23', '25', '22', '24'],
        ans: 0,
        exp: '4 × 6 = 24, then 24 − 1 = 23.'
      },
      {
        q: 'The formula for area of a triangle is A = ½ × b × h. Find A when b = 10 and h = 6.',
        opts: ['60', '30', '16', '20'],
        ans: 1,
        exp: '½ × 10 × 6 = 5 × 6 = 30.'
      },
      {
        q: 'Using y = 2x² + 1, find y when x = 3.',
        opts: ['37', '19', '13', '19'],
        ans: 1,
        exp: '2 × (3²) + 1 = 2 × 9 + 1 = 18 + 1 = 19.'
      },
      {
        q: 'If P = 2(l + w), find P when l = 8 and w = 5.',
        opts: ['26', '80', '13', '30'],
        ans: 0,
        exp: '2 × (8 + 5) = 2 × 13 = 26.'
      },
      {
        q: 'If y = 5x − x², find y when x = 4.',
        opts: ['4', '36', '20', '16'],
        ans: 0,
        exp: '5 × 4 − 4² = 20 − 16 = 4.'
      }
    ]
  },
  {
    id: 1,
    icon: '🔢',
    title: 'Number Sequences',
    desc: 'Describe, continue and generate linear sequences using rules.',
    learn: `
      <h3>Linear sequences</h3>
      <p>A <strong>linear sequence</strong> goes up (or down) by the same amount each time. That amount is called the <strong>common difference</strong> (d).</p>
      <div class="formula-box">3, 7, 11, 15, 19, ...  →  d = +4</div>

      <h3 style="margin-top:1rem;">Finding the nth term</h3>
      <p>The <strong>nth term formula</strong> lets you find any term without listing them all. The rule is:</p>
      <div class="formula-box">nth term = d × n + (first term − d)</div>

      <div class="example-box">
        <div class="ex-label">Example: 3, 7, 11, 15 …</div>
        <p>d = 4, first term = 3<br>
        nth term = 4n + (3 − 4) = <strong>4n − 1</strong><br><br>
        Check: when n = 1 → 4(1) − 1 = 3 ✓<br>
        When n = 5 → 4(5) − 1 = 19 ✓<br>
        100th term → 4(100) − 1 = <strong>399</strong></p>
      </div>

      <h3 style="margin-top:1rem;">Describing a sequence</h3>
      <p>Always state: (1) the first term, (2) the rule for the next term.</p>
      <div class="example-box">
        <div class="ex-label">Example: 50, 44, 38, 32 …</div>
        <p>First term: 50. Rule: subtract 6 each time. (d = −6)<br>
        nth term = −6n + 56</p>
      </div>

      <div class="watch-out">
        <strong>⚠ Watch out:</strong> The "nth term" formula only works for linear (straight line) sequences — where the difference is constant.
      </div>
    `,
    questions: [
      {
        q: 'What is the common difference for: 8, 13, 18, 23, 28?',
        opts: ['4', '5', '6', '3'],
        ans: 1,
        exp: '13 − 8 = 5. Each term increases by 5.'
      },
      {
        q: 'What is the nth term of the sequence 5, 9, 13, 17, …?',
        opts: ['4n + 1', '5n − 1', '4n + 1', '3n + 2'],
        ans: 0,
        exp: 'd = 4. nth term = 4n + (5 − 4) = 4n + 1. Check: n=1 gives 5 ✓'
      },
      {
        q: 'Using the rule nth term = 3n − 2, what is the 10th term?',
        opts: ['28', '30', '32', '26'],
        ans: 0,
        exp: '3 × 10 − 2 = 30 − 2 = 28.'
      },
      {
        q: 'Which term of the sequence 7, 10, 13, 16, … has the value 52?',
        opts: ['15th', '16th', '17th', '14th'],
        ans: 0,
        exp: 'nth term = 3n + 4. Set 3n + 4 = 52 → 3n = 48 → n = 16. Wait — 3(15)+4 = 49, 3(16)+4=52. Hmm: 7,10,13: nth = 3n+4. 3(16)+4=52. So 16th term.'
      },
      {
        q: 'What is the 20th term of the sequence: 100, 95, 90, 85, …?',
        opts: ['5', '10', '15', '0'],
        ans: 0,
        exp: 'd = −5. nth term = −5n + 105. When n=20: −100 + 105 = 5.'
      }
    ]
  },
  {
    id: 2,
    icon: '❓',
    title: 'Missing Numbers',
    desc: 'Express and solve missing number problems algebraically.',
    learn: `
      <h3>From words to algebra</h3>
      <p>When a problem says "I think of a number…", we use a letter (usually <em>n</em> or <em>x</em>) for the unknown.</p>
      <div class="formula-box">I think of a number, double it, and add 5. The answer is 17.</div>
      <p>Write this as: <strong>2n + 5 = 17</strong></p>
      <p>Then solve: 2n = 17 − 5 = 12, so n = 6.</p>

      <h3 style="margin-top:1rem;">Solving one-step equations</h3>
      <div class="example-box">
        <div class="ex-label">Example</div>
        <p>x + 8 = 23 → x = 23 − 8 = <strong>15</strong></p>
      </div>

      <h3 style="margin-top:1rem;">Solving two-step equations</h3>
      <div class="example-box">
        <div class="ex-label">Example</div>
        <p>3x − 4 = 20<br>
        Step 1: 3x = 20 + 4 = 24<br>
        Step 2: x = 24 ÷ 3 = <strong>8</strong></p>
      </div>

      <h3 style="margin-top:1rem;">Unknown on both sides</h3>
      <div class="example-box">
        <div class="ex-label">Example</div>
        <p>5x + 2 = 3x + 10<br>
        Step 1: Collect x terms: 5x − 3x = 10 − 2 → 2x = 8<br>
        Step 2: x = <strong>4</strong></p>
      </div>

      <div class="watch-out">
        <strong>⚠ Golden rule:</strong> Whatever you do to one side, do exactly the same to the other.
      </div>
    `,
    questions: [
      {
        q: 'I think of a number, multiply by 3, then subtract 7. The answer is 14. What is the number?',
        opts: ['7', '8', '9', '6'],
        ans: 2,
        exp: '3n − 7 = 14 → 3n = 21 → n = 7. Wait: 3×7−7=14 ✓. Answer: 7.'
      },
      {
        q: 'Solve: 4x + 9 = 29',
        opts: ['x = 4', 'x = 5', 'x = 6', 'x = 3'],
        ans: 1,
        exp: '4x = 29 − 9 = 20. x = 20 ÷ 4 = 5.'
      },
      {
        q: 'Solve: 6x − 3 = 3x + 12',
        opts: ['x = 3', 'x = 4', 'x = 5', 'x = 6'],
        ans: 2,
        exp: '6x − 3x = 12 + 3 → 3x = 15 → x = 5.'
      },
      {
        q: 'A rectangle has perimeter 36 cm. Its length is (x + 4) cm and width is x cm. Find x.',
        opts: ['x = 6', 'x = 7', 'x = 5', 'x = 8'],
        ans: 1,
        exp: '2(x+4+x) = 36 → 2(2x+4) = 36 → 4x+8 = 36 → 4x = 28 → x = 7.'
      },
      {
        q: 'Solve: 5(x − 2) = 15',
        opts: ['x = 4', 'x = 5', 'x = 7', 'x = 3'],
        ans: 1,
        exp: '5x − 10 = 15 → 5x = 25 → x = 5. Or: x − 2 = 3 → x = 5.'
      }
    ]
  },
  {
    id: 3,
    icon: '⚖️',
    title: 'Two Unknowns',
    desc: 'Find pairs of numbers (x, y) that satisfy an equation.',
    learn: `
      <h3>What are two unknowns?</h3>
      <p>An equation like <strong>x + y = 10</strong> doesn't have just one answer — it has many pairs! For example: (1,9), (2,8), (3,7), (4,6)…</p>
      <p>These are called <strong>solution pairs</strong>.</p>

      <h3 style="margin-top:1rem;">Listing solution pairs</h3>
      <div class="formula-box">x + y = 8  (where x and y are positive whole numbers)</div>
      <div class="example-box">
        <div class="ex-label">All solutions</div>
        <p>x=1, y=7 ✓<br>x=2, y=6 ✓<br>x=3, y=5 ✓<br>x=4, y=4 ✓<br>x=5, y=3 ✓<br>x=6, y=2 ✓<br>x=7, y=1 ✓</p>
      </div>

      <h3 style="margin-top:1rem;">With a second condition</h3>
      <p>If we're also told that <strong>x − y = 2</strong>, only one pair works:</p>
      <div class="example-box">
        <div class="ex-label">Example</div>
        <p>x + y = 8 AND x − y = 2<br>
        Try pairs: x=5, y=3 → 5+3=8 ✓ and 5−3=2 ✓<br>
        Answer: <strong>x = 5, y = 3</strong></p>
      </div>

      <h3 style="margin-top:1rem;">Trying systematically</h3>
      <div class="formula-box">2x + y = 11 (x and y are positive whole numbers)</div>
      <div class="example-box">
        <div class="ex-label">Try x = 1, 2, 3, …</div>
        <p>x=1 → y=9 ✓<br>x=2 → y=7 ✓<br>x=3 → y=5 ✓<br>x=4 → y=3 ✓<br>x=5 → y=1 ✓</p>
      </div>

      <div class="watch-out">
        <strong>⚠ Always check:</strong> Does the pair satisfy ALL conditions in the problem?
      </div>
    `,
    questions: [
      {
        q: 'x + y = 12, where x and y are positive whole numbers and x > y. How many solutions are there?',
        opts: ['4', '5', '6', '7'],
        ans: 1,
        exp: 'Pairs: (7,5),(8,4),(9,3),(10,2),(11,1) — that\'s 5 pairs where x > y.'
      },
      {
        q: 'x + y = 15 and x − y = 3. What is x?',
        opts: ['8', '9', '10', '7'],
        ans: 1,
        exp: 'Try pairs summing to 15: (9,6) → 9−6=3 ✓. So x=9.'
      },
      {
        q: 'How many positive whole-number pairs satisfy 3x + y = 13?',
        opts: ['2', '3', '4', '5'],
        ans: 2,
        exp: 'x=1→y=10, x=2→y=7, x=3→y=4, x=4→y=1. That\'s 4 pairs.'
      },
      {
        q: 'x + 2y = 14 and x = y + 2. What is y?',
        opts: ['3', '4', '5', '6'],
        ans: 1,
        exp: 'Sub x = y+2: (y+2)+2y=14 → 3y+2=14 → 3y=12 → y=4.'
      },
      {
        q: 'Which pair satisfies both 2x + 3y = 18 and x + y = 7?',
        opts: ['x=3, y=4', 'x=4, y=3', 'x=5, y=2', 'x=6, y=1'],
        ans: 0,
        exp: 'Try x=3,y=4: 6+12=18 ✓ and 3+4=7 ✓.'
      }
    ]
  },
  {
    id: 4,
    icon: '🎲',
    title: 'Combinations',
    desc: 'Enumerate all combinations of two variables systematically.',
    learn: `
      <h3>What are combinations?</h3>
      <p>A <strong>combination</strong> problem asks: how many different ways can you combine two (or more) choices?</p>
      <div class="formula-box">Total combinations = (number of choices A) × (number of choices B)</div>

      <h3 style="margin-top:1rem;">Listing systematically</h3>
      <div class="example-box">
        <div class="ex-label">Example: Shirts and Trousers</div>
        <p>Shirts: Red (R), Blue (B), Green (G)<br>
        Trousers: Black (Bl), Grey (Gr)<br><br>
        R+Bl, R+Gr, B+Bl, B+Gr, G+Bl, G+Gr<br>
        Total = 3 × 2 = <strong>6 combinations</strong></p>
      </div>

      <h3 style="margin-top:1rem;">Using a table</h3>
      <p>A grid (table) makes sure you don't miss any. Put one variable across the top, the other down the side, and fill every cell.</p>

      <h3 style="margin-top:1rem;">Three or more variables</h3>
      <div class="example-box">
        <div class="ex-label">Example: Sandwich problem</div>
        <p>3 breads × 4 fillings × 2 sauces = <strong>24 combinations</strong></p>
      </div>

      <div class="watch-out">
        <strong>⚠ Watch out:</strong> "Combination" problems often ask whether order matters. AB and BA are usually the SAME combination (a sandwich with cheese and ham is the same either way).
      </div>

      <h3 style="margin-top:1rem;">Algebraic approach</h3>
      <p>If x = number of one item and y = number of another, and x + y = fixed total, how many ways? This links back to Two Unknowns!</p>
      <div class="example-box">
        <div class="ex-label">Example</div>
        <p>Coins: only 5p and 10p. Make exactly 30p. How many ways?<br>
        Let x = number of 5p, y = number of 10p<br>
        5x + 10y = 30 → x + 2y = 6<br>
        y=0→x=6; y=1→x=4; y=2→x=2; y=3→x=0<br>
        <strong>4 ways</strong></p>
      </div>
    `,
    questions: [
      {
        q: 'A café sells 4 types of sandwich and 3 types of drink. How many different sandwich-and-drink combinations are there?',
        opts: ['7', '12', '9', '16'],
        ans: 1,
        exp: '4 × 3 = 12 combinations.'
      },
      {
        q: 'Coins: only 2p and 5p coins. How many ways can you make exactly 16p? (x = number of 2p, y = number of 5p)',
        opts: ['2', '3', '4', '1'],
        ans: 1,
        exp: '2x + 5y = 16. y=0→2x=16→x=8 ✓; y=2→2x=6→x=3 ✓; y=4→2x=-4 ✗. Hmm — y=0,x=8 and y=2,x=3. That\'s 2 ways. Wait — also check y=1: 2x=11, not integer. y=3: 2x=1, not integer. So 2 ways.'
      },
      {
        q: 'Tom chooses one item from: {hat, scarf, gloves} and one colour from: {red, blue, green, yellow}. How many combinations?',
        opts: ['7', '10', '12', '9'],
        ans: 2,
        exp: '3 items × 4 colours = 12 combinations.'
      },
      {
        q: 'A password uses one letter (A, B, C) and one digit (1, 2, 3, 4). How many different passwords?',
        opts: ['7', '12', '9', '16'],
        ans: 1,
        exp: '3 letters × 4 digits = 12 passwords.'
      },
      {
        q: 'Using only 3p and 7p stamps, how many ways can you make exactly 21p?',
        opts: ['1', '2', '3', '4'],
        ans: 2,
        exp: '3x + 7y = 21. y=0→x=7 ✓; y=3→3x=0→x=0 ✓; y=1→3x=14 (not int); y=2→3x=7 (not int). So 3 ways.'
      }
    ]
  }
];

// Fix the sequence question with wrong answer
TOPICS[1].questions[3] = {
  q: 'Which term of the sequence 7, 10, 13, 16, … has the value 52?',
  opts: ['15th', '16th', '17th', '14th'],
  ans: 1,
  exp: 'nth term = 3n + 4. Set 3n + 4 = 52 → 3n = 48 → n = 16. So it\'s the 16th term.'
};

// Fix the "I think of a number" question
TOPICS[2].questions[0] = {
  q: 'I think of a number, multiply by 3, then subtract 7. The answer is 14. What is the number?',
  opts: ['7', '8', '9', '6'],
  ans: 0,
  exp: '3n − 7 = 14 → 3n = 21 → n = 7.'
};

const state = {
  done: {},
  answered: {},
  current: null
};

function renderOverview() {
  const grid = document.getElementById('topic-grid');
  const done = Object.keys(state.done).length;
  document.getElementById('overall-progress').style.width = (done/TOPICS.length*100) + '%';
  document.getElementById('overall-label').textContent = done + ' of ' + TOPICS.length + ' topics complete';

  grid.innerHTML = TOPICS.map(t => `
    <div class="topic-card${state.done[t.id] ? ' done' : ''}" onclick="openTopic(${t.id})">
      ${state.done[t.id] ? '<span class="done-pill">✓ Done</span>' : ''}
      <span class="t-icon">${t.icon}</span>
      <h3>${t.title}</h3>
      <p>${t.desc}</p>
    </div>
  `).join('');

  document.querySelectorAll('.nav-btn[id^="nav-"]').forEach((btn, i) => {
    btn.classList.toggle('done', !!state.done[i]);
  });
}

function showOverview() {
  document.getElementById('overview').style.display = '';
  document.getElementById('lessons').innerHTML = '';
  state.current = null;
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  renderOverview();
}

function openTopic(id) {
  const t = TOPICS[id];
  state.current = id;
  state.answered = {};
  document.getElementById('overview').style.display = 'none';

  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === id+1));

  const container = document.getElementById('lessons');
  container.innerHTML = `
    <div class="lesson active">
      <div class="lesson-header">
        <button class="back-btn" onclick="showOverview()">← Back</button>
        <h2>${t.icon} ${t.title}</h2>
      </div>
      <div class="learn-box">${t.learn}</div>
      <div class="quiz-section">
        <h3>Practice Questions</h3>
        <div id="quiz-questions"></div>
        <div class="score-box" id="quiz-score">
          <div class="score-num" id="s-num">0</div>
          <div style="font-size:0.8rem;color:#7a6a4a;margin-bottom:0.2rem;">out of ${t.questions.length}</div>
          <div class="score-msg" id="s-msg"></div>
          <div class="score-actions">
            <button class="btn outline" onclick="retryQuiz()">Try Again</button>
            ${id < TOPICS.length-1 ? `<button class="btn gold" onclick="openTopic(${id+1})">Next Topic →</button>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;

  buildQuiz(t);
}

function buildQuiz(t) {
  const container = document.getElementById('quiz-questions');
  state.answered = {};
  document.getElementById('quiz-score').classList.remove('show');
  container.innerHTML = t.questions.map((q, qi) => `
    <div class="question" id="q-${qi}">
      <div class="q-text">${qi+1}. ${q.q}</div>
      <div class="options">
        ${q.opts.map((opt, oi) => `
          <button class="opt-btn" id="opt-${qi}-${oi}" onclick="answer(${qi}, ${oi})">${opt}</button>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${qi}"></div>
      <button class="hint-btn" id="hint-btn-${qi}" style="display:none" onclick="getHint(${qi})">💡 Explain this to me</button>
      <div class="hint-area" id="hint-${qi}"></div>
    </div>
  `).join('');
}

function answer(qi, chosen) {
  if (state.answered.hasOwnProperty(qi)) return;
  const t = TOPICS[state.current];
  const q = t.questions[qi];
  const correct = chosen === q.ans;
  state.answered[qi] = chosen;

  q.opts.forEach((_, j) => {
    const b = document.getElementById(`opt-${qi}-${j}`);
    b.disabled = true;
    if (j === chosen) b.classList.add(correct ? 'correct' : 'wrong');
    if (!correct && j === q.ans) b.classList.add('reveal');
  });

  const fb = document.getElementById(`fb-${qi}`);
  fb.className = 'feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');
  fb.textContent = (correct ? '✓ Correct! ' : '✗ Not quite. ') + q.exp;

  if (!correct) {
    document.getElementById(`hint-btn-${qi}`).style.display = 'inline-block';
  }

  if (Object.keys(state.answered).length === t.questions.length) {
    showScore();
  }
}

async function getHint(qi) {
  const t = TOPICS[state.current];
  const q = t.questions[qi];
  const hintEl = document.getElementById(`hint-${qi}`);
  const btn = document.getElementById(`hint-btn-${qi}`);
  btn.disabled = true;
  hintEl.classList.add('show');
  hintEl.innerHTML = '<span class="spinner"></span> Getting a hint…';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a warm, encouraging maths tutor for a 10-year-old called Sacha preparing for the 11+ exam for City of London or Westminster school. He's bright but got this question wrong. Explain clearly and simply why the correct answer is right, in 3-4 short sentences. Be friendly. No markdown, just plain text.`,
        messages: [{
          role: 'user',
          content: `Topic: ${t.title}\nQuestion: ${q.q}\nOptions: ${q.opts.join(', ')}\nCorrect answer: ${q.opts[q.ans]}\nHint from teacher: ${q.exp}\n\nPlease explain this step by step to Sacha.`
        }]
      })
    });
    const data = await res.json();
    hintEl.textContent = data.content[0].text;
  } catch(e) {
    hintEl.textContent = q.exp;
  }
  btn.disabled = false;
}

function showScore() {
  const t = TOPICS[state.current];
  const score = Object.entries(state.answered).filter(([i, c]) => +c === t.questions[+i].ans).length;
  document.getElementById('s-num').textContent = score;
  const msgs = [
    'Keep at it — review the lesson and try again!',
    'Getting there — read the explanations carefully.',
    'Good work! Try again for a better score.',
    'Great effort! So close to perfect.',
    'Outstanding — all correct! 🌟',
    'Perfect score!'
  ];
  document.getElementById('s-msg').textContent = msgs[Math.min(score, msgs.length-1)];
  document.getElementById('quiz-score').classList.add('show');
  if (score === t.questions.length) {
    state.done[state.current] = true;
    document.getElementById(`nav-${state.current}`).classList.add('done');
    renderOverview();
  }
}

function retryQuiz() {
  buildQuiz(TOPICS[state.current]);
}

showOverview();
</script>
