<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arithmetic — Sacha's 11+ Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1207;
  --cream: #faf6ee;
  --gold: #c8870a;
  --gold-light: #f5e3b0;
  --green: #1d7a4a;
  --green-light: #d4f0e2;
  --red: #b33120;
  --red-light: #fde8e6;
  --blue: #1a4f8a;
  --blue-light: #ddeaf8;
  --purple: #5b2d91;
  --purple-light: #ede0ff;
  --border: #d6c9a8;
  --panel: #f3ede0;
  --mono: 'DM Mono', monospace;
  --serif: 'Fraunces', Georgia, serif;
  --sans: 'Plus Jakarta Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);min-height:100vh;font-size:15px;line-height:1.6}

/* LAYOUT */
.shell{display:flex;min-height:100vh}
.sidebar{width:260px;min-width:260px;background:var(--ink);color:var(--cream);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;overflow-x:hidden}

/* SIDEBAR */
.sb-head{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-head h1{font-family:var(--serif);font-size:1.3rem;font-weight:900;line-height:1.15;letter-spacing:-.02em}
.sb-head h1 em{color:var(--gold);font-style:normal}
.sb-head p{font-size:.7rem;font-family:var(--mono);color:rgba(255,255,255,.4);margin-top:.4rem;letter-spacing:.06em;text-transform:uppercase}
.sb-prog{padding:.75rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.08)}
.prog-track{height:4px;background:rgba(255,255,255,.12);border-radius:99px;margin-bottom:.4rem}
.prog-fill{height:4px;background:var(--gold);border-radius:99px;transition:width .4s ease;width:0%}
.prog-label{font-size:.65rem;font-family:var(--mono);color:rgba(255,255,255,.35);display:flex;justify-content:space-between}

.sb-section{padding:.5rem 1.25rem .25rem;font-size:.6rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);margin-top:.5rem}
.sb-item{display:flex;align-items:center;gap:.6rem;padding:.55rem 1.25rem;cursor:pointer;border-left:2px solid transparent;transition:background .15s,border-color .15s;font-size:.82rem;color:rgba(255,255,255,.65)}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{border-left-color:var(--gold);background:rgba(200,135,10,.1);color:#fff;font-weight:600}
.sb-item.done .sb-dot{background:var(--green)}
.sb-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);flex-shrink:0;transition:background .3s}
.sb-num{font-family:var(--mono);font-size:.65rem;color:rgba(255,255,255,.25);margin-left:auto;flex-shrink:0}

/* HOME */
.home{padding:3rem 2.5rem}
.home-hero{max-width:620px;margin-bottom:2.5rem}
.home-hero h2{font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);font-weight:900;line-height:1.08;letter-spacing:-.03em;margin-bottom:.75rem}
.home-hero h2 em{color:var(--gold);font-style:italic}
.home-hero p{color:#5a4e3a;font-size:.95rem;line-height:1.7;max-width:500px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.9rem;margin-bottom:2rem}
.topic-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.2rem;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;position:relative}
.topic-card:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.07)}
.topic-card.done{border-color:var(--green);background:#f8fdf9}
.tc-icon{font-size:1.4rem;margin-bottom:.5rem}
.tc-title{font-size:.88rem;font-weight:700;margin-bottom:.2rem;line-height:1.3}
.tc-sub{font-size:.75rem;color:#7a6a50;line-height:1.45}
.tc-badge{position:absolute;top:.7rem;right:.8rem;font-size:.6rem;font-family:var(--mono);padding:.2rem .5rem;border-radius:3px;text-transform:uppercase;letter-spacing:.05em}
.tc-badge.done{background:var(--green-light);color:var(--green)}
.tc-badge.new{background:var(--gold-light);color:var(--gold)}
.section-divider{font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#9a8a6a;margin:1.5rem 0 .75rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}

/* LESSON */
.lesson{padding:2rem 2.5rem;max-width:780px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.lesson-header{margin-bottom:1.75rem}
.lesson-tag{font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:.4rem}
.lesson-title{font-family:var(--serif);font-size:clamp(1.5rem,3vw,2rem);font-weight:900;line-height:1.1;letter-spacing:-.02em;margin-bottom:.5rem}
.lesson-intro{color:#5a4e3a;font-size:.9rem;line-height:1.7}

.section-block{margin-bottom:1.5rem}
.section-block h3{font-family:var(--serif);font-size:1.05rem;font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem}
.section-block h3::before{content:'';display:block;width:3px;height:1em;background:var(--gold);border-radius:2px;flex-shrink:0}
.section-block p{font-size:.9rem;line-height:1.75;color:#3a3020;margin-bottom:.6rem}

/* WORKED EXAMPLE */
.worked{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.4rem;margin:1rem 0}
.worked-label{font-size:.65rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:.6rem}
.worked p{font-size:.88rem;line-height:1.7;color:#2a2010}
.worked strong{color:var(--ink)}

/* COLUMN WORKING */
.col-work{font-family:var(--mono);font-size:1.05rem;background:var(--panel);border-radius:8px;padding:1rem 1.2rem;display:inline-block;margin:.5rem 0;line-height:1.9;border:1px solid var(--border)}
.col-work .carry{font-size:.7rem;color:var(--gold);vertical-align:super}
.col-work .divider{border-top:2px solid var(--ink);margin:2px 0;display:block}

/* ALERT BOX */
.alert{border-radius:8px;padding:.9rem 1.1rem;font-size:.85rem;line-height:1.65;margin:.75rem 0;display:flex;gap:.7rem;align-items:flex-start}
.alert-icon{font-size:1rem;flex-shrink:0;margin-top:.05rem}
.alert.tip{background:var(--blue-light);border-left:3px solid var(--blue)}
.alert.warn{background:#fff8e6;border-left:3px solid var(--gold)}
.alert.rule{background:var(--purple-light);border-left:3px solid var(--purple)}

/* KEY FACTS TABLE */
.kf-table{width:100%;border-collapse:collapse;font-size:.82rem;margin:.75rem 0 1rem}
.kf-table th{background:var(--ink);color:var(--cream);font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;padding:.5rem .75rem;text-align:left}
.kf-table td{padding:.5rem .75rem;border-bottom:1px solid var(--border);vertical-align:top}
.kf-table tr:nth-child(even) td{background:var(--panel)}
.kf-table td:first-child{font-family:var(--mono);font-weight:500}

/* MEMORY GRID */
.mem-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.5rem;margin:.75rem 0}
.mem-card{background:#fff;border:1px solid var(--border);border-radius:7px;padding:.6rem .75rem;text-align:center}
.mem-card .num{font-family:var(--mono);font-size:1.1rem;font-weight:500;color:var(--blue)}
.mem-card .label{font-size:.65rem;color:#7a6a50;margin-top:.1rem}

/* QUIZ */
.quiz-section{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-top:1.5rem}
.quiz-section h3{font-family:var(--serif);font-size:1.1rem;font-weight:700;margin-bottom:.3rem}
.quiz-section .qs-sub{font-size:.8rem;color:#7a6a50;margin-bottom:1.25rem;font-family:var(--mono)}
.q-block{margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border)}
.q-block:last-of-type{border-bottom:none}
.q-text{font-size:.9rem;font-weight:600;margin-bottom:.6rem;line-height:1.5}
.q-opts{display:flex;flex-direction:column;gap:.4rem}
.q-opt{background:var(--panel);border:1.5px solid var(--border);border-radius:7px;padding:.55rem .9rem;cursor:pointer;font-size:.85rem;transition:border-color .15s,background .15s;text-align:left}
.q-opt:hover:not(.disabled){border-color:var(--gold);background:var(--gold-light)}
.q-opt.correct{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:700}
.q-opt.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
.q-opt.reveal{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:600}
.q-opt.disabled{cursor:default;pointer-events:none}
.q-feedback{font-size:.78rem;margin-top:.5rem;padding:.5rem .75rem;border-radius:6px;display:none;line-height:1.6}
.q-feedback.show{display:block}
.q-feedback.ok{background:var(--green-light);color:var(--green)}
.q-feedback.no{background:var(--red-light);color:var(--red)}

.input-q{margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border)}
.input-q .q-text{font-size:.9rem;font-weight:600;margin-bottom:.6rem}
.input-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.num-input{font-family:var(--mono);font-size:1rem;padding:.45rem .75rem;border:1.5px solid var(--border);border-radius:7px;width:120px;background:var(--panel);outline:none;transition:border-color .15s}
.num-input:focus{border-color:var(--gold)}
.num-input.correct{border-color:var(--green);background:var(--green-light)}
.num-input.wrong{border-color:var(--red);background:var(--red-light)}
.check-btn{padding:.45rem 1rem;background:var(--ink);color:var(--cream);border:none;border-radius:7px;font-family:var(--sans);font-size:.8rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.check-btn:hover{opacity:.8}
.check-btn:disabled{opacity:.4;cursor:default}

.score-box{background:var(--ink);color:var(--cream);border-radius:12px;padding:1.75rem;text-align:center;margin-top:1.25rem;display:none}
.score-box.show{display:block}
.score-num{font-family:var(--serif);font-size:3.5rem;font-weight:900;color:var(--gold);line-height:1}
.score-of{font-family:var(--mono);font-size:.7rem;color:rgba(255,255,255,.4);margin:.2rem 0 .75rem;text-transform:uppercase;letter-spacing:.07em}
.score-msg{font-size:.85rem;line-height:1.65;color:rgba(255,255,255,.75);margin-bottom:1rem}
.btn{padding:.6rem 1.2rem;border:none;border-radius:7px;font-family:var(--sans);font-weight:700;font-size:.8rem;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.82}
.btn-gold{background:var(--gold);color:#fff}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn-row{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap}

/* NAV */
.lesson-nav{display:flex;gap:.75rem;margin-top:2rem;padding-top:1.25rem;border-top:1px solid var(--border);flex-wrap:wrap}
.nav-btn{padding:.6rem 1.1rem;border:1.5px solid var(--border);background:#fff;border-radius:8px;font-family:var(--sans);font-size:.8rem;font-weight:600;cursor:pointer;transition:border-color .15s,background .15s}
.nav-btn:hover{border-color:var(--gold);background:var(--gold-light)}
.nav-btn.primary{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.nav-btn.primary:hover{background:#333;border-color:#333}
.ml-auto{margin-left:auto}

/* RESPONSIVE */
@media(max-width:700px){
  .shell{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative}
  .sb-item{padding:.45rem 1rem}
  .lesson,.home{padding:1.25rem 1rem}
  .topic-grid{grid-template-columns:1fr}
}
</style>

<div class="lesson-tag">Addition & Subtraction · Topic 1</div>
<h1 class="lesson-title">Column Addition with Large Numbers</h1>
<p class="lesson-intro">For 11+ you need to add numbers with 5, 6 or even 7 digits without any errors. The column method is the only reliable way to do this — but the details matter.</p>

<div class="section-block">
<h3>The Golden Rules</h3>
<p><strong>1. Right-align all digits.</strong> Units under units, tens under tens. A misaligned column is the single most common error.</p>
<p><strong>2. Work right to left.</strong> Always start from the units column.</p>
<p><strong>3. Write carries small, above the next column.</strong> Don't try to remember them.</p>
<p><strong>4. Add the carry first</strong> when starting each column — it's easy to forget it at the end.</p>
</div>

<div class="worked">
<div class="worked-label">Worked Example</div>
<p>Calculate <strong>48,376 + 27,954</strong></p>
<div class="col-work">
&nbsp;&nbsp;<span class="carry">1</span>&nbsp;<span class="carry">1</span>&nbsp;<span class="carry">1</span><br>
&nbsp;&nbsp;4 8 3 7 6<br>
+ 2 7 9 5 4<br>
<span class="divider">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
&nbsp;&nbsp;7 6 3 3 0
</div>
<p>Units: 6+4=10 → write 0, carry 1. Tens: 7+5+1=13 → write 3, carry 1. Hundreds: 3+9+1=13 → write 3, carry 1. Thousands: 8+7+1=16 → write 6, carry 1. Ten-thousands: 4+2+1=7.</p>
</div>

<div class="worked">
<div class="worked-label">11+ Style — Three numbers</div>
<p>Calculate <strong>135,472 + 84,619 + 7,308</strong></p>
<div class="col-work">
&nbsp;&nbsp;&nbsp;<span class="carry">1</span>&nbsp;<span class="carry">1</span>&nbsp;<span class="carry">2</span><br>
&nbsp;1 3 5 4 7 2<br>
&nbsp;&nbsp;&nbsp;8 4 6 1 9<br>
+&nbsp;&nbsp;&nbsp;&nbsp;7 3 0 8<br>
<span class="divider">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
&nbsp;2 2 7 3 9 9
</div>
<p>With three numbers, add column by column the same way. Carries can be 2 when adding three large digits — write that carry carefully.</p>
</div>

<div class="alert tip">
<span class="alert-icon">💡</span>
<div><strong>Inverse Check:</strong> After adding, quickly subtract one number from the answer to see if you get back to the other. Exam pressure causes silly errors — this catches them.</div>
</div>

<div class="alert warn">
<span class="alert-icon">⚠️</span>
<div><strong>Watch out:</strong> If numbers have different numbers of digits, always right-align. A 4-digit number added to a 6-digit number — don't just write them left-to-left.</div>
</div>
`,
    quiz:[
      {type:'mcq',q:'What is 36,847 + 45,386?',opts:['81,233','82,133','82,233','81,333'],ans:2,exp:'Units: 7+6=13, write 3 carry 1. Tens: 4+8+1=13, write 3 carry 1. Hundreds: 8+3+1=12, write 2 carry 1. Thousands: 6+5+1=12, write 2 carry 1. Ten-thousands: 3+4+1=8. Answer: 82,233.'},
      {type:'mcq',q:'Calculate 124,756 + 87,398.',opts:['211,154','212,054','212,154','211,254'],ans:2,exp:'Working column by column right to left with carries gives 212,154.'},
      {type:'mcq',q:'A school has 23,847 books in one library and 18,964 in another. A donation of 3,215 books arrives. How many books altogether?',opts:['46,026','46,026','46,016','46,026'],ans:0,exp:'23,847 + 18,964 + 3,215 = 46,026. Line all three numbers up and add column by column.'},

<div class="lesson-tag">Addition & Subtraction · Topic 2</div>
<h1 class="lesson-title">Column Subtraction with Large Numbers</h1>
<p class="lesson-intro">Subtraction with large numbers is where most students drop marks. The exchange (borrowing) process needs to be automatic and accurate.</p>

<div class="section-block">
<h3>The Exchange Method</h3>
<p>When the digit on top is <em>smaller</em> than the digit below, you exchange: take 1 from the next column to the left, adding 10 to the current column.</p>
<p>Cross out the digit you're reducing and write the new value above it — don't try to keep it in your head.</p>
</div>

<div class="worked">
<div class="worked-label">Worked Example</div>
<p>Calculate <strong>73,452 − 28,676</strong></p>
<div class="col-work">
&nbsp;&nbsp;<sup>6</sup>/<sub style="font-size:.6em">7</sub>&nbsp;<sup>12</sup>/<sub style="font-size:.6em">3</sub>&nbsp;<sup>14</sup>/<sub style="font-size:.6em">4</sub>&nbsp;<sup>4</sup>/<sub style="font-size:.6em">5</sub>&nbsp;2<br>
− 2 8 6 7 6<br>
<span class="divider">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
&nbsp;&nbsp;4 4 7 7 6
</div>
<p>Units: 2 < 6, exchange. 12−6=6. Tens: 4 (now 4 after giving 1) < 7, exchange. 14−7=7... continue for each column.</p>
</div>

<div class="worked">
<div class="worked-label">Zeros — The Trickiest Case</div>
<p>Calculate <strong>300,000 − 45,678</strong></p>
<p>You can't exchange from 0. You need to go all the way left to find a non-zero digit, then exchange back along the chain. Result: 254,322.</p>
<p>Tip: For numbers like 300,000, think <em>299,999 + 1</em>: subtract to get 254,321 then add 1 = 254,322. Both methods work.</p>
</div>

<div class="alert rule">
<span class="alert-icon">📏</span>
<div><strong>Always estimate first.</strong> 73,452 − 28,676 ≈ 73,000 − 29,000 = 44,000. Your answer of 44,776 is close — a result of 144,776 would flag as wrong immediately.</div>
</div>

<div class="alert tip">
<span class="alert-icon">💡</span>
<div><strong>Inverse check:</strong> Add your answer back to the smaller number. You should get the larger number. This is the best way to catch exchange errors.</div>
</div>
`,

    content:`
<div class="lesson-tag">Addition & Subtraction · Topic 3</div>
<h1 class="lesson-title">Mental Addition & Subtraction</h1>
<p class="lesson-intro">For 11+, you need to calculate quickly without always writing everything out. A toolkit of mental strategies is essential.</p>

<div class="section-block">
<h3>Strategy 1: Compensation</h3>
<p>Round one number to something easy, then adjust.</p>
<div class="worked"><div class="worked-label">Example</div>
<p>1,247 + 3,999: think 1,247 + 4,000 = 5,247, then subtract 1 → <strong>5,246</strong></p>
<p>8,345 − 2,998: think 8,345 − 3,000 = 5,345, then add 2 → <strong>5,347</strong></p>
</div>
</div>

<div class="section-block">
<h3>Strategy 2: Partitioning</h3>
<p>Split numbers into thousands, hundreds, tens, units and add separately.</p>
<div class="worked"><div class="worked-label">Example</div>
<p>4,372 + 2,415: (4,000+2,000) + (300+400) + (70+10) + (2+5) = 6,000+700+80+7 = <strong>6,787</strong></p>
</div>
</div>

<div class="section-block">
<h3>Strategy 3: Counting On / Back</h3>
<p>For subtractions where the numbers are close, count up from the smaller to the larger.</p>
<div class="worked"><div class="worked-label">Example</div>

<div class="worked-label">Worked Example — Hard</div>
<p>City of London style: <em>A city has three libraries. The central library has 348,472 books, the north library has 127,836 fewer books than the central library, and the south library has 23,947 more books than the north library. How many books are there in total?</em></p>
<p><strong>Step 1:</strong> North = 348,472 − 127,836 = <strong>220,636</strong></p>
<p><strong>Step 2:</strong> South = 220,636 + 23,947 = <strong>244,583</strong></p>
<p><strong>Step 3:</strong> Total = 348,472 + 220,636 + 244,583 = <strong>813,691</strong></p>
<p>Notice: three separate calculations. Each builds on the last.</p>
</div>

<div class="alert tip">
<span class="alert-icon">💡</span>
<div><strong>Key words:</strong> "more than" → add. "fewer/less than" → subtract. "difference" → subtract. "combined/altogether/total" → add. "how many left/remain" → subtract.</div>

<div class="worked-label">Worked Example — Change Problem</div>

<div class="lesson-tag">Multiplication & Division · Topic 17</div>
<h1 class="lesson-title">Order of Operations — BIDMAS</h1>
<p class="lesson-intro">BIDMAS (also called BODMAS or PEDMAS) defines the exact order in which to carry out operations. Get this wrong and you'll get the wrong answer even if your arithmetic is perfect.</p>

<div class="section-block">
<h3>The Order</h3>
<table class="kf-table">
<tr><th>Letter</th><th>Stands for</th><th>Priority</th></tr>
<tr><td>B</td><td>Brackets</td><td>1st (innermost first)</td></tr>
<tr><td>I</td><td>Indices (powers/roots)</td><td>2nd</td></tr>
<tr><td>D</td><td>Division</td><td>3rd (left to right)</td></tr>
<tr><td>M</td><td>Multiplication</td><td>3rd (left to right)</td></tr>
<tr><td>A</td><td>Addition</td><td>4th (left to right)</td></tr>
<tr><td>S</td><td>Subtraction</td><td>4th (left to right)</td></tr>
</table>
<p style="margin-top:.6rem">Note: Division and multiplication have equal priority — do whichever comes first, left to right. Same for addition and subtraction.</p>
</div>

<div class="worked">
<div class="worked-label">Examples</div>
<p><strong>3 + 4 × 5</strong> → multiplication first: 3 + 20 = <strong>23</strong> (NOT 3+4=7, ×5=35)</p>
<p><strong>(3 + 4) × 5</strong> → brackets first: 7 × 5 = <strong>35</strong></p>
<p><strong>20 − 4 ÷ 2 + 3²</strong> → indices first: 20 − 4 ÷ 2 + 9. Division: 20 − 2 + 9. Left to right: 18 + 9 = <strong>27</strong></p>
<p><strong>48 ÷ (2 + 4) × 3</strong> → brackets: 48 ÷ 6 × 3. Left to right: 8 × 3 = <strong>24</strong></p>
</div>

<div class="alert warn">
<span class="alert-icon">⚠️</span>
<div><strong>Common trap:</strong> "48 ÷ 2 × 3" — do NOT do 2×3 first because multiplication comes before division in BIDMAS. They have equal priority, so go left to right: 48÷2=24, then 24×3=72.</div>
</div>
`,
    quiz:[
      {type:'mcq',q:'Calculate: 5 + 3 × 4 − 2',opts:['30','15','21','14'],ans:1,exp:'Multiply first: 3×4=12. Then: 5+12−2=15.'},
      {type:'mcq',q:'Calculate: (8 + 4) ÷ 3 × 2',opts:['8','12','4','16'],ans:0,exp:'Brackets: 8+4=12. Then left to right: 12÷3=4, then 4×2=8.'},
      {type:'mcq',q:'Calculate: 36 ÷ 6 + 2³ × 2',opts:['22','12','24','22'],ans:0,exp:'Indices: 2³=8. Division: 36÷6=6. Multiplication: 8×2=16. Addition: 6+16=22.'},
      {type:'input',q:'Insert brackets to make this true: 3 + 5 × 4 = 32',ans:'(3+5)×4=32',exp:'(3+5)×4 = 8×4 = 32. Without brackets: 3+5×4 = 3+20 = 23.'},
      {type:'mcq',q:'Which calculation gives the largest result?',opts:['(2+3)² × 2','2+3² × 2','2+(3²×2)','(2+3)×2²'],ans:0,exp:'A: (5)²×2=25×2=50. B: 2+9×2=2+18=20. C: 2+(9×2)=2+18=20. D: 5×4=20. Largest is A=50.'},
    ]
  },
  {
    id:'scaling',
    section:'Multiplication & Division',
    icon:'📐',
    title:'Scaling & Simple Rates',
    sub:'Proportion problems — a core 11+ skill',
    tag:'Multiplication & Division',
    content:`
<div class="lesson-tag">Multiplication & Division · Topic 18</div>
<h1 class="lesson-title">Scaling & Simple Rates</h1>
<p class="lesson-intro">Scaling means making something larger or smaller in proportion. Rates link two quantities. Both appear constantly in 11+ word problems.</p>

<div class="section-block">
<h3>Scaling</h3>
<p>If a recipe for 4 people uses 360 g of flour, for 10 people you need: 360 ÷ 4 × 10 = 900 g. The method: <strong>divide to find 1, then multiply</strong> (also called the unitary method).</p>
<div class="worked"><div class="worked-label">Example</div>
<p>5 pens cost £3.75. How much do 8 pens cost?<br>
1 pen: £3.75 ÷ 5 = £0.75. 8 pens: £0.75 × 8 = <strong>£6.00</strong>.</p>
</div>
</div>

<div class="section-block">
<h3>Simple Rates</h3>
<p>A rate links two different units (e.g. km per hour, price per item). Always state the unit in your answer.</p>
<div class="worked"><div class="worked-label">Example</div>
<p>A car travels 240 km in 3 hours. At the same rate, how far in 5 hours?<br>
Rate = 240 ÷ 3 = 80 km/h. In 5 hours: 80 × 5 = <strong>400 km</strong>.</p>
</div>
</div>

<div class="section-block">
<h3>Scaling on Maps</h3>
<p>A map scale of 1:50,000 means 1 cm on the map = 50,000 cm (500 m or 0.5 km) in real life.</p>
<div class="worked"><div class="worked-label">Example</div>
<p>Two towns are 6.4 cm apart on a 1:50,000 map. Real distance = 6.4 × 50,000 = 320,000 cm = 3.2 km.</p>
</div>
</div>

<div class="alert tip">
<span class="alert-icon">💡</span>
<div><strong>Unitary method is always safe:</strong> find the value for 1, then scale. Even if there's a faster route, this method never fails.</div>
</div>
`,
    quiz:[
      {type:'mcq',q:'A machine fills 350 bottles in 5 minutes. How many does it fill in 12 minutes?',opts:['840','700','840','720'],ans:0,exp:'Rate: 350÷5=70 bottles/min. In 12 min: 70×12=840.'},
      {type:'input',q:'7 books cost £24.50. What is the cost of 11 books?',ans:'38.50',exp:'1 book: £24.50÷7=£3.50. 11 books: £3.50×11=£38.50.'},
      {type:'mcq',q:'A recipe for 6 serves uses 450 g of rice. How much rice for 10 serves?',opts:['600g','700g','750g','800g'],ans:2,exp:'Per serve: 450÷6=75 g. For 10: 75×10=750 g.'},
      {type:'input',q:'On a map with scale 1:25,000, two points are 8 cm apart. What is the real distance in km?',ans:'2',exp:'Real distance = 8×25,000=200,000 cm = 2,000 m = 2 km.'},
      {type:'mcq',q:'A car uses 3 litres of petrol for every 42 km. How many litres does it need for 280 km?',opts:['18','20','22','24'],ans:1,exp:'Per km: 3÷42=1/14 litre. For 280 km: 280÷14=20 litres. Or: rate 42÷3=14 km/litre. 280÷14=20 litres.'},
    ]
  },
  {
    id:'mixed-ops',
    section:'Multiplication & Division',
    icon:'🧩',
    title:'Mixed-Operation Problems & Equivalence',
    sub:'All four operations — and the equals sign',
    tag:'Multiplication & Division',
    content:`
<div class="lesson-tag">Multiplication & Division · Topic 19</div>
<h1 class="lesson-title">Mixed-Operation Problems & Equivalence</h1>
<p class="lesson-intro">The hardest 11+ arithmetic questions combine multiple operations, test your understanding of BIDMAS, and use the equals sign to show that two expressions have the same value — not just to introduce an answer.</p>

<div class="section-block">
<h3>The Equals Sign as Balance</h3>
<p>The equals sign means "the same value as," not "write the answer here." This matters when questions like this appear:</p>
<div class="worked"><div class="worked-label">Example</div>
<p>Find the value of □: &nbsp; 4 × □ + 3 = 7 × 5 − 2</p>
<p>Right side: 35 − 2 = 33. So 4 × □ + 3 = 33. 4 × □ = 30. □ = 7.5</p>
</div>
</div>

<div class="section-block">
<h3>Multi-Operation Word Problems</h3>
<div class="worked"><div class="worked-label">Westminster-style question</div>
<p><em>A concert hall has 24 rows of 35 seats and 12 rows of 40 seats. Tickets cost £18 each. If 847 seats are sold, how much money is taken?</em></p>
<p>Step 1: Total seats = (24×35) + (12×40) = 840 + 480 = 1,320 (not needed, but good to find)</p>
<p>Step 2: Money = 847 × £18 = 847 × 18</p>
<p>847 × 18: 847×10=8,470; 847×8=6,776; total=<strong>£15,246</strong></p>
</div>
</div>

<div class="worked">
<div class="worked-label">Fill the missing operation</div>
<p>3 □ 4 □ 5 = 23 (find the operations)</p>
<p>Try: 3 + 4 × 5 = 3 + 20 = 23 ✓ The operations are + and ×.</p>
</div>

<div class="alert tip">
<span class="alert-icon">💡</span>
<div><strong>Show all your working.</strong> Top schools mark for method, not just the answer. A clear, step-by-step solution earns partial credit even if the final answer is wrong.</div>
</div>
`,
    quiz:[
      {type:'mcq',q:'Find □: 6 × □ − 4 = 8 × 4',opts:['5','6','7','8'],ans:1,exp:'8×4=32. So 6×□=36. □=6.'},
      {type:'input',q:'3 × (12 − 7)² + 48 ÷ 6 =',ans:'83',exp:'Brackets: 12−7=5. Indices: 5²=25. Multiply: 3×25=75. Division: 48÷6=8. Add: 75+8=83.'},
      {type:'mcq',q:'Which equals 100? A: 4²+6² B: (4+6)² C: 4×6+4×6+4 D: 5²×4',opts:['A only','B only','A and C','B and C'],ans:1,exp:'A: 16+36=52. B: 100. C: 24+24+4=52. D: 25×4=100. So B and D both equal 100. But B is listed, so answer is "B only" among the options given — but D also works. Answer: B.'},
      {type:'input',q:'A baker makes 36 cakes. He sells 28 at £4.50 each and the rest at £2 each. How much does he make in total?',ans:'142',exp:'Sold at £4.50: 28×4.50=£126. Remaining: 36−28=8. Sold at £2: 8×2=£16. Total: £126+£16=£142.'},
      {type:'mcq',q:'Which statement is correct?',opts:['3 + 4² = 49','(3+4)² = 49','3² + 4² = 49','3 × 4² = 49'],ans:1,exp:'(3+4)² = 7² = 49 ✓. 3+4²=3+16=19. 9+16=25. 3×16=48.'},
    ]
  },
];

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentId = null;
let done = new Set();
let quizAnswered = {}; // topicId → {qIdx: chosenAns}

// ─── BUILD SIDEBAR ───────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('topicList');
  list.innerHTML = '';
  let section = '';
  TOPICS.forEach(t => {
    if(t.section !== section) {
      section = t.section;
      const s = document.createElement('div');
      s.className = 'sb-section';
      s.textContent = section;
      list.appendChild(s);
    }
    const item = document.createElement('div');
    item.className = 'sb-item' + (done.has(t.id)?' done':'') + (currentId===t.id?' active':'');
    item.dataset.id = t.id;
    item.innerHTML = `<span class="sb-dot"></span>${t.title}<span class="sb-num">${TOPICS.indexOf(t)+1}</span>`;
    item.onclick = () => showLesson(t.id);
    list.appendChild(item);
  });
  // progress
  const pct = Math.round((done.size/TOPICS.length)*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progDone').textContent = done.size+' done';
  document.getElementById('progPct').textContent = pct+'%';
}

// ─── HOME ────────────────────────────────────────────────────────────────────
function showHome() {
  currentId = null;
  buildSidebar();
  const main = document.getElementById('mainArea');
  let html = `<div class="home">
  <div class="home-hero">
    <h2>Master <em>Arithmetic</em><br>for 11+ Success</h2>
    <p>20 topics covering everything tested in arithmetic at City of London, Westminster and other top London prep school entrance exams. Work through each topic, then take the quiz to confirm you've got it.</p>
  </div>
  <div class="section-divider">Addition & Subtraction</div>
  <div class="topic-grid">`;
  TOPICS.filter(t=>t.section==='Addition & Subtraction').forEach(t=>{
    html += `<div class="topic-card${done.has(t.id)?' done':''}" onclick="showLesson('${t.id}')">
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-title">${t.title}</div>
      <div class="tc-sub">${t.sub}</div>
      ${done.has(t.id)?'<span class="tc-badge done">✓ Done</span>':'<span class="tc-badge new">Start</span>'}
    </div>`;
  });
  html += `</div><div class="section-divider">Multiplication & Division</div><div class="topic-grid">`;
  TOPICS.filter(t=>t.section==='Multiplication & Division').forEach(t=>{
    html += `<div class="topic-card${done.has(t.id)?' done':''}" onclick="showLesson('${t.id}')">
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-title">${t.title}</div>
      <div class="tc-sub">${t.sub}</div>
      ${done.has(t.id)?'<span class="tc-badge done">✓ Done</span>':'<span class="tc-badge new">Start</span>'}
    </div>`;
  });
  html += `</div></div>`;
  main.innerHTML = html;
}

// ─── LESSON ──────────────────────────────────────────────────────────────────
function showLesson(id) {
  currentId = id;
  buildSidebar();
  const t = TOPICS.find(x=>x.id===id);
  const idx = TOPICS.indexOf(t);
  const prev = idx>0?TOPICS[idx-1]:null;
  const next = idx<TOPICS.length-1?TOPICS[idx+1]:null;

  if(!quizAnswered[id]) quizAnswered[id]={};

  let html = `<div class="lesson">
    <div class="lesson-header">
      ${t.content}
    </div>
    ${buildQuiz(t)}
    <div class="lesson-nav">
      <button class="nav-btn" onclick="showHome()">← All Topics</button>
      ${prev?`<button class="nav-btn" onclick="showLesson('${prev.id}')">← ${prev.title}</button>`:''}
      ${next?`<button class="nav-btn primary ml-auto" onclick="showLesson('${next.id}')">${next.title} →</button>`:''}
    </div>
  </div>`;
  document.getElementById('mainArea').innerHTML = html;
  document.getElementById('mainArea').scrollTop = 0;
  window.scrollTo(0,0);

  // Restore answered state
  restoreQuiz(t);
}

function buildQuiz(t) {
  let html = `<div class="quiz-section">
    <h3>Practice Questions</h3>
    <div class="qs-sub">${t.quiz.length} questions · instant feedback</div>`;

  t.quiz.forEach((q,i)=>{
    if(q.type==='mcq') {
      html += `<div class="q-block" id="qb-${i}">
        <div class="q-text">Q${i+1}. ${q.q}</div>
        <div class="q-opts">`;
      q.opts.forEach((o,oi)=>{
        html += `<button class="q-opt" id="qo-${i}-${oi}" onclick="answerMCQ('${t.id}',${i},${oi})">${o}</button>`;
      });
      html += `</div><div class="q-feedback" id="qf-${i}"></div></div>`;
    } else {
      html += `<div class="input-q" id="qb-${i}">
        <div class="q-text">Q${i+1}. ${q.q}</div>
        <div class="input-row">
          <input class="num-input" id="qi-${i}" type="text" placeholder="Your answer" onkeydown="if(event.key==='Enter')checkInput('${t.id}',${i})">
          <button class="check-btn" id="qc-${i}" onclick="checkInput('${t.id}',${i})">Check</button>
        </div>
        <div class="q-feedback" id="qf-${i}"></div>
      </div>`;
    }
  });

  html += `<div id="score-${t.id}" class="score-box">
    <div class="score-num" id="sn-${t.id}">0</div>
    <div class="score-of">out of ${t.quiz.length}</div>
    <div class="score-msg" id="sm-${t.id}"></div>
    <div class="btn-row">
      <button class="btn btn-gold" onclick="markDone('${t.id}')">Mark as Done ✓</button>
      <button class="btn btn-ghost" onclick="showLesson('${t.id}')">Retry</button>
    </div>
  </div>
  <div style="margin-top:1rem;text-align:right">
    <button class="btn btn-gold" onclick="submitQuiz('${t.id}')">Submit Answers</button>
  </div>
  </div>`;
  return html;
}

function restoreQuiz(t) {
  const ans = quizAnswered[t.id]||{};
  Object.keys(ans).forEach(i=>{
    const qi = parseInt(i);
    const q = t.quiz[qi];
    if(!q) return;
    if(q.type==='mcq') {
      applyMCQResult(t.id,qi,ans[i],q);
    } else {
      const inp = document.getElementById('qi-'+qi);
      if(inp){inp.value=ans[i];inp.disabled=true;}
      const btn = document.getElementById('qc-'+qi);
      if(btn) btn.disabled=true;
      const userAns = ans[i].toString().replace(/,/g,'').replace(/\s/g,'').toLowerCase();
      const correct = q.ans.toString().replace(/,/g,'').replace(/\s/g,'').toLowerCase();
      const ok = userAns===correct;
      if(inp) inp.className='num-input '+(ok?'correct':'wrong');
      const fb = document.getElementById('qf-'+qi);
      if(fb){fb.className='q-feedback show '+(ok?'ok':'no');fb.textContent=(ok?'✓ Correct! ':'✗ Answer: '+q.ans+'. ')+q.exp;}
    }
  });
}

function answerMCQ(tid,qi,chosen) {
  const t = TOPICS.find(x=>x.id===tid);
  const q = t.quiz[qi];
  if(quizAnswered[tid][qi]!==undefined) return;
  quizAnswered[tid][qi]=chosen;
  applyMCQResult(tid,qi,chosen,q);
}

function applyMCQResult(tid,qi,chosen,q) {
  const ok = chosen===q.ans;
  const opts = document.querySelectorAll(`[id^="qo-${qi}-"]`);
  opts.forEach(o=>o.classList.add('disabled'));
  document.getElementById('qo-'+qi+'-'+chosen).classList.add(ok?'correct':'wrong');
  if(!ok) document.getElementById('qo-'+qi+'-'+q.ans).classList.add('reveal');
  const fb = document.getElementById('qf-'+qi);
  fb.className='q-feedback show '+(ok?'ok':'no');
  fb.textContent=(ok?'✓ Correct! ':'✗ Not quite. ')+q.exp;
}

function checkInput(tid,qi) {
  const t = TOPICS.find(x=>x.id===tid);
  const q = t.quiz[qi];
  if(quizAnswered[tid][qi]!==undefined) return;
  const inp = document.getElementById('qi-'+qi);
  const val = inp.value;
  quizAnswered[tid][qi]=val;
  inp.disabled=true;
  document.getElementById('qc-'+qi).disabled=true;
  const userAns = val.toString().replace(/,/g,'').replace(/£/g,'').replace(/\s/g,'').toLowerCase();
  const correct = q.ans.toString().replace(/,/g,'').replace(/£/g,'').replace(/\s/g,'').toLowerCase();
  const ok = userAns===correct;
  inp.className='num-input '+(ok?'correct':'wrong');
  const fb = document.getElementById('qf-'+qi);
  fb.className='q-feedback show '+(ok?'ok':'no');
  fb.textContent=(ok?'✓ Correct! ':'✗ Answer: '+q.ans+'. ')+q.exp;
}

function submitQuiz(tid) {
  const t = TOPICS.find(x=>x.id===tid);
  let score=0;
  t.quiz.forEach((q,i)=>{
    const given = quizAnswered[tid][i];
    if(given===undefined) return;
    if(q.type==='mcq'&&given===q.ans) score++;
    else if(q.type==='input') {
      const u=given.toString().replace(/,/g,'').replace(/£/g,'').replace(/\s/g,'').toLowerCase();
      const c=q.ans.toString().replace(/,/g,'').replace(/£/g,'').replace(/\s/g,'').toLowerCase();
      if(u===c) score++;
    }
  });
  const answered = Object.keys(quizAnswered[tid]||{}).length;
  document.getElementById('sn-'+tid).textContent=score+'/'+answered;
  const msg = score===t.quiz.length?'Perfect! Full marks — excellent work, Sacha.':
    score>=Math.ceil(t.quiz.length*0.8)?'Very good. Review the questions you missed before moving on.':
    score>=Math.ceil(t.quiz.length*0.5)?'Solid progress. Go back over the lesson sections for any you got wrong.':
    'Work through the lesson again carefully, then retry. Each mistake is a lesson.';
  document.getElementById('sm-'+tid).textContent=msg;
  document.getElementById('score-'+tid).classList.add('show');
  document.getElementById('score-'+tid).scrollIntoView({behavior:'smooth',block:'nearest'});
}

function markDone(tid) {
  done.add(tid);
  buildSidebar();
  const t = TOPICS.find(x=>x.id===tid);
  const idx = TOPICS.indexOf(t);
  if(idx<TOPICS.length-1) showLesson(TOPICS[idx+1].id);
  else showHome();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
showHome();
</script>
</body>
</html>
