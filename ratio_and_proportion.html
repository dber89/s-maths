<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratio & Proportion — Sacha's 11+ Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Literata:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1b2d;--navy2:#1a2d45;--navy3:#243a55;
  --teal:#2bbfa4;--teal2:#1a9e87;--teal-glow:rgba(43,191,164,.15);
  --amber:#f0a500;--amber2:#d4920a;
  --cream:#f7f3ec;
  --red:#e05555;--green:#3dbb7a;
  --text:#f0ece4;--text2:#a8b8c8;--text3:#6a7f94;
  --card:#1e3048;--card2:#243650;
  --border:rgba(255,255,255,.08);
  --mono:'JetBrains Mono',monospace;
  --serif:'Literata',Georgia,serif;
  --sans:'Syne',sans-serif;
  --r:10px;
}
html,body{height:100%;font-family:var(--sans);background:var(--navy);color:var(--text);font-size:14px;line-height:1.6}

.app{display:grid;grid-template-columns:260px 1fr;height:100vh;overflow:hidden}
@media(max-width:700px){.app{grid-template-columns:1fr;height:auto;overflow:auto}}

/* SIDEBAR */
.sidebar{background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:20px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-head h1{font-size:18px;font-weight:800;letter-spacing:-.03em;line-height:1.2}
.sb-head h1 em{color:var(--teal);font-style:normal}
.sb-head p{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
.prog-wrap{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.prog-track{background:var(--navy3);border-radius:99px;height:4px}
.prog-fill{background:linear-gradient(90deg,var(--teal),var(--amber));height:4px;border-radius:99px;transition:width .5s;width:0%}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:5px;font-family:var(--mono)}
.topic-list{overflow-y:auto;flex:1;padding:8px}
.topic-list::-webkit-scrollbar{width:4px}
.topic-list::-webkit-scrollbar-thumb{background:var(--navy3);border-radius:99px}
.topic-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background .15s}
.topic-item:hover{background:var(--navy3)}
.topic-item.active{background:var(--teal-glow);border:1px solid rgba(43,191,164,.25)}
.topic-item.active .ti-num{background:var(--teal);color:var(--navy)}
.topic-item.done .ti-num{background:var(--green);color:#fff}
.ti-num{width:26px;height:26px;border-radius:50%;background:var(--navy3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:var(--mono);transition:background .2s}
.ti-info{flex:1;min-width:0}
.ti-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-sub{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-check{color:var(--green);font-size:14px;flex-shrink:0}

/* MAIN */
.main{overflow-y:auto;display:flex;flex-direction:column}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--navy3);border-radius:99px}

.panel{flex:1;padding:32px 40px;max-width:800px;width:100%}
@media(max-width:900px){.panel{padding:24px 20px}}

.panel-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.topic-badge{display:inline-flex;align-items:center;gap:6px;background:var(--teal-glow);border:1px solid rgba(43,191,164,.3);color:var(--teal);font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:99px;margin-bottom:12px;letter-spacing:.05em}
.panel-title{font-size:clamp(20px,3vw,28px);font-weight:800;letter-spacing:-.03em;line-height:1.2;margin-bottom:8px}
.panel-desc{font-size:14px;color:var(--text2);font-family:var(--serif);font-style:italic;line-height:1.6}

/* LESSON CONTENT */
.lesson{margin-bottom:32px}
.lesson-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:16px}
.lesson-section h3{font-size:14px;font-weight:700;color:var(--teal);margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono)}
.lesson-section p{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:10px;font-family:var(--serif)}
.lesson-section p:last-child{margin-bottom:0}
.lesson-section ul{padding-left:18px;color:var(--text2);font-family:var(--serif);font-size:14px;line-height:1.8}

.key-rule{background:linear-gradient(135deg,rgba(43,191,164,.12),rgba(43,191,164,.04));border:1px solid rgba(43,191,164,.3);border-radius:8px;padding:14px 18px;margin:12px 0;font-size:14px;color:var(--text);font-family:var(--mono);line-height:1.6}
.key-rule strong{color:var(--teal);display:block;margin-bottom:4px;font-size:12px;text-transform:uppercase;letter-spacing:.06em}

.example-box{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.25);border-radius:8px;padding:16px 18px;margin:12px 0}
.example-box .ex-label{font-size:11px;font-family:var(--mono);color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.example-box .ex-q{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px}
.example-box .ex-step{font-size:13px;color:var(--text2);font-family:var(--serif);margin-bottom:4px;padding-left:10px;border-left:2px solid rgba(240,165,0,.3)}
.example-box .ex-ans{font-size:14px;color:var(--amber);font-weight:700;margin-top:8px;font-family:var(--mono)}

.tip-box{background:rgba(61,187,122,.08);border:1px solid rgba(61,187,122,.25);border-radius:8px;padding:12px 16px;margin:10px 0;font-size:13px;color:#7fd9a8;font-family:var(--serif)}
.tip-box::before{content:'💡 ';font-style:normal}

/* QUIZ */
.quiz-section{margin-top:8px}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.quiz-header h2{font-size:18px;font-weight:800;letter-spacing:-.02em}
.quiz-meta{font-size:12px;color:var(--text3);font-family:var(--mono)}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:14px;transition:border-color .2s}
.q-card.correct{border-color:var(--green)}
.q-card.wrong{border-color:var(--red)}
.q-num{font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.q-text{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.5;font-family:var(--serif)}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.q-opts{grid-template-columns:1fr}}
.q-btn{background:var(--navy3);border:1px solid var(--border);color:var(--text2);font-family:var(--sans);font-size:13px;padding:10px 14px;border-radius:8px;cursor:pointer;text-align:left;transition:all .15s;font-weight:500}
.q-btn:hover:not(:disabled){background:var(--card2);border-color:rgba(255,255,255,.15);color:var(--text)}
.q-btn:disabled{cursor:default}
.q-btn.selected-correct{background:rgba(61,187,122,.15);border-color:var(--green);color:var(--green)}
.q-btn.selected-wrong{background:rgba(224,85,85,.15);border-color:var(--red);color:var(--red)}
.q-btn.reveal-correct{background:rgba(61,187,122,.1);border-color:rgba(61,187,122,.4);color:var(--green)}
.q-feedback{display:none;margin-top:12px;font-size:13px;font-family:var(--serif);padding:10px 14px;border-radius:6px;line-height:1.5}
.q-feedback.show{display:block}
.q-feedback.cf{background:rgba(61,187,122,.1);color:#7fd9a8;border:1px solid rgba(61,187,122,.2)}
.q-feedback.wf{background:rgba(224,85,85,.1);color:#f0a8a8;border:1px solid rgba(224,85,85,.2)}

.hint-btn{background:none;border:1px solid rgba(240,165,0,.35);color:var(--amber);font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:99px;cursor:pointer;margin-top:8px;display:none;transition:all .2s}
.hint-btn:hover{background:rgba(240,165,0,.1)}
.hint-box{display:none;margin-top:10px;font-size:13px;font-family:var(--serif);color:var(--text2);background:rgba(240,165,0,.06);border:1px solid rgba(240,165,0,.2);border-radius:6px;padding:10px 14px;line-height:1.5}
.hint-box.show{display:block}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(240,165,0,.3);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.quiz-score{display:none;background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid rgba(43,191,164,.3);border-radius:var(--r);padding:28px;text-align:center;margin-top:16px}
.quiz-score.show{display:block}
.score-circle{width:80px;height:80px;border-radius:50%;background:var(--teal-glow);border:3px solid var(--teal);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;font-weight:800;color:var(--teal);font-family:var(--mono)}
.score-msg{font-size:14px;color:var(--text2);font-family:var(--serif);margin-bottom:20px;line-height:1.6;max-width:480px;margin-left:auto;margin-right:auto}
.score-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--teal);color:var(--navy);font-family:var(--sans);font-size:13px;font-weight:700;padding:10px 22px;border-radius:99px;border:none;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:var(--teal2);transform:translateY(-1px)}
.btn-secondary{background:var(--navy3);color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:600;padding:10px 22px;border-radius:99px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.btn-secondary:hover{background:var(--card2);color:var(--text)}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px}
.welcome h2{font-size:clamp(24px,4vw,36px);font-weight:800;letter-spacing:-.04em;margin-bottom:12px}
.welcome h2 em{color:var(--teal);font-style:normal}
.welcome p{font-size:15px;color:var(--text2);font-family:var(--serif);max-width:480px;line-height:1.7;margin-bottom:24px}
.topic-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:520px;margin-bottom:28px}
.pill{background:var(--card);border:1px solid var(--border);border-radius:99px;padding:6px 14px;font-size:12px;color:var(--text2);font-family:var(--mono)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-head">
      <h1>Ratio &amp; <em>Proportion</em></h1>
      <p>Sacha's 11+ Prep · 4 Topics</p>
    </div>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-lbl"><span>Progress</span><span id="progTxt">0 / 4</span></div>
    </div>
    <div class="topic-list" id="topicList"></div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="panel">
      <div class="welcome" id="welcomeScreen">
        <h2>Ratio &amp; <em>Proportion</em></h2>
        <p>Four essential topics for your 11+ exams at City of London or Westminster. Work through each lesson, then tackle the practice questions.</p>
        <div class="topic-pills">
          <span class="pill">Missing Values</span>
          <span class="pill">Ratio Notation</span>
          <span class="pill">Scale Factors</span>
          <span class="pill">Unequal Sharing</span>
        </div>
        <button class="btn-primary" onclick="openTopic(0)">Start Topic 1 →</button>
      </div>
      <div id="topicContent" style="display:none"></div>
    </div>
  </main>
</div>

<script>
const TOPICS = [
  {
    id:0,
    icon:'🔍',
    title:'Missing Values',
    sub:'Proportional situations',
    badge:'TOPIC 1',
    desc:'Use multiplication and division to find unknown values in proportional relationships.',
    lesson:[
      {
        heading:'What is a Proportional Situation?',
        body:`<p>Two quantities are <strong>proportional</strong> if they always have the same ratio — if one doubles, the other doubles too. Finding a missing value means spotting that relationship and applying it.</p>
        <div class="key-rule"><strong>The Core Idea</strong>If 3 pencils cost 75p, find what 7 pencils cost.<br>Step 1: Find the unit value → 75 ÷ 3 = 25p each<br>Step 2: Multiply → 7 × 25p = 175p = £1.75</div>
        <p>This "unitary method" — finding the value of <em>one</em> first — is the safest strategy for any proportional problem.</p>`
      },
      {
        heading:'Scaling Up and Down',
        body:`<p>Sometimes you scale by a whole number rather than finding the unit value first. Look for a direct multiplier between the two quantities.</p>
        <div class="example-box">
          <div class="ex-label">Worked Example</div>
          <div class="ex-q">A recipe for 4 people needs 320 g of flour. How much for 10 people?</div>
          <div class="ex-step">Method 1 (unitary): 320 ÷ 4 = 80 g per person → 80 × 10 = 800 g</div>
          <div class="ex-step">Method 2 (multiplier): 4 → 10 means × 2.5, so 320 × 2.5 = 800 g</div>
          <div class="ex-ans">Answer: 800 g</div>
        </div>
        <div class="tip-box">Always check your answer makes sense — 10 people need more than 4 people, so 800 g &gt; 320 g ✓</div>`
      },
      {
        heading:'Tables of Values',
        body:`<p>Proportion questions sometimes show a table with one value missing. Find the multiplier between the known columns, then apply it.</p>
        <div class="example-box">
          <div class="ex-label">Worked Example</div>
          <div class="ex-q">Speed (km/h): 60 | 90 | ?  ·  Time (min): 20 | 30 | 45</div>
          <div class="ex-step">Time goes from 20 → 30 → 45. Speed goes 60 → 90 → ?</div>
          <div class="ex-step">Ratio: speed × time = constant. 60 × 20 = 1200. 1200 ÷ 45 = ?</div>
          <div class="ex-step">Actually easier: 20 → 45 is ×2.25. But 60 × 2.25 = 135? Let's unitary: 1200 ÷ 45 ≈ 26.7. Check: is the pattern simple? 45 min at ? km/h. 60 km/h in 20 min = 20 km. So 20 km in 45 min = 20÷45 × 60 = 26.7 km/h.</div>
          <div class="ex-ans">Tip: for inverse proportion (faster = less time), multiply stays constant</div>
        </div>`
      }
    ],
    questions:[
      {q:'5 identical books cost £8.75. How much do 8 books cost?',opts:['£12.00','£14.00','£13.50','£11.50'],ans:1,exp:'Unit price: £8.75 ÷ 5 = £1.75 per book. 8 × £1.75 = £14.00.'},
      {q:'A car travels 180 km using 15 litres of fuel. How far does it travel on 25 litres?',opts:['280 km','300 km','270 km','310 km'],ans:1,exp:'180 ÷ 15 = 12 km per litre. 12 × 25 = 300 km.'},
      {q:'If 4 workers take 9 days to finish a job, how many days would 6 workers take? (assume same rate)',opts:['6 days','5 days','7 days','8 days'],ans:0,exp:'Total work = 4 × 9 = 36 worker-days. 36 ÷ 6 workers = 6 days.'},
      {q:'A recipe for 6 portions uses 450 ml of cream. How much cream for 10 portions?',opts:['650 ml','750 ml','700 ml','800 ml'],ans:1,exp:'450 ÷ 6 = 75 ml per portion. 75 × 10 = 750 ml.'},
      {q:'In a table, when x = 7, y = 28. When x = 11, what is y? (y is proportional to x)',opts:['40','42','44','48'],ans:2,exp:'y = 4x (since 28 ÷ 7 = 4). When x = 11: y = 4 × 11 = 44.'},
    ]
  },
  {
    id:1,
    icon:'⚖️',
    title:'Ratio Notation',
    sub:'Comparing quantities',
    badge:'TOPIC 2',
    desc:'Write ratios in their simplest form and use them to compare quantities in real-life problems.',
    lesson:[
      {
        heading:'What is a Ratio?',
        body:`<p>A ratio compares two (or more) quantities of the <strong>same type</strong>. We write it using a colon: <strong>a : b</strong>.</p>
        <div class="key-rule"><strong>Key Points</strong>• Ratios have no units — "3 : 5" not "3 cm : 5 cm"<br>• Order matters — 2 : 3 is NOT the same as 3 : 2<br>• Always simplify by dividing both sides by the HCF</div>
        <div class="example-box">
          <div class="ex-label">Simplifying</div>
          <div class="ex-q">Write 24 : 36 in its simplest form</div>
          <div class="ex-step">HCF of 24 and 36 is 12</div>
          <div class="ex-step">24 ÷ 12 = 2, 36 ÷ 12 = 3</div>
          <div class="ex-ans">Answer: 2 : 3</div>
        </div>`
      },
      {
        heading:'Equivalent Ratios',
        body:`<p>Like equivalent fractions, you can multiply or divide both parts of a ratio by the same number to get an equivalent ratio.</p>
        <div class="example-box">
          <div class="ex-label">Worked Example</div>
          <div class="ex-q">In a class, the ratio of boys to girls is 3 : 4. If there are 12 boys, how many girls?</div>
          <div class="ex-step">3 : 4 → multiply by 4 → 12 : 16</div>
          <div class="ex-step">So if there are 12 boys, there are 16 girls</div>
          <div class="ex-ans">Answer: 16 girls</div>
        </div>
        <div class="tip-box">The multiplier applied to boys (3 → 12, so ×4) must be applied to girls too (4 × 4 = 16).</div>`
      },
      {
        heading:'Ratio and Fractions',
        body:`<p>Ratios and fractions are closely linked. If the ratio of red to blue is 3 : 5, then:</p>
        <div class="key-rule"><strong>From ratio to fraction</strong>Total parts = 3 + 5 = 8<br>Fraction that is red = 3/8<br>Fraction that is blue = 5/8</div>
        <div class="example-box">
          <div class="ex-label">Worked Example</div>
          <div class="ex-q">Paint is mixed in the ratio red : white = 2 : 7. What fraction of the mixture is red?</div>
          <div class="ex-step">Total parts = 2 + 7 = 9</div>
          <div class="ex-ans">Fraction that is red = 2/9</div>
        </div>`
      }
    ],
    questions:[
      {q:'Write the ratio 36 : 48 in its simplest form.',opts:['3 : 4','4 : 3','6 : 8','9 : 12'],ans:0,exp:'HCF of 36 and 48 is 12. 36 ÷ 12 = 3, 48 ÷ 12 = 4. Simplest form: 3 : 4.'},
      {q:'The ratio of apples to oranges is 5 : 3. If there are 35 apples, how many oranges?',opts:['18','21','24','15'],ans:1,exp:'5 → 35 means ×7. So oranges = 3 × 7 = 21.'},
      {q:'In a bag of sweets, the ratio of red to green is 4 : 5. What fraction of the sweets are green?',opts:['4/9','5/9','4/5','1/2'],ans:1,exp:'Total parts = 4 + 5 = 9. Fraction that is green = 5/9.'},
      {q:'Which ratio is equivalent to 3 : 7?',opts:['6 : 15','9 : 21','12 : 25','15 : 42'],ans:1,exp:'Multiply both parts by 3: 3 × 3 = 9, 7 × 3 = 21. So 9 : 21 ✓ (check: 6:15 → 2:5, 12:25 and 15:42 do not simplify to 3:7).'},
      {q:'A smoothie uses mango and yogurt in the ratio 3 : 2. How much mango is needed with 300 ml yogurt?',opts:['200 ml','400 ml','450 ml','600 ml'],ans:2,exp:'2 parts = 300 ml, so 1 part = 150 ml. Mango = 3 × 150 = 450 ml.'},
    ]
  },
  {
    id:2,
    icon:'📐',
    title:'Scale Factors & Similar Shapes',
    sub:'Enlargement and reduction',
    badge:'TOPIC 3',
    desc:'Use scale factors to find missing lengths in similar shapes and solve map and model problems.',
    lesson:[
      {
        heading:'What Makes Shapes Similar?',
        body:`<p>Two shapes are <strong>similar</strong> if one is an enlargement (or reduction) of the other. All corresponding angles are equal and all corresponding sides are in the same ratio — the <strong>scale factor</strong>.</p>
        <div class="key-rule"><strong>Scale Factor Formula</strong>Scale factor = new length ÷ original length<br>New length = original length × scale factor<br>Original length = new length ÷ scale factor</div>
        <div class="tip-box">Always match up corresponding sides — sides in the same position in each shape.</div>`
      },
      {
        heading:'Finding Missing Lengths',
        body:`<p>Identify one pair of corresponding sides where both lengths are known, then compute the scale factor. Apply it to find the unknown side.</p>
        <div class="example-box">
          <div class="ex-label">Worked Example</div>
          <div class="ex-q">Two similar triangles: small has sides 4 cm and 6 cm. The large one has the side corresponding to 6 cm equal to 9 cm. Find the other side of the large triangle.</div>
          <div class="ex-step">Scale factor = 9 ÷ 6 = 1.5</div>
          <div class="ex-step">Other side = 4 × 1.5 = 6 cm</div>
          <div class="ex-ans">Answer: 6 cm</div>
        </div>`
      },
      {
        heading:'Maps and Models',
        body:`<p>A map scale like 1 : 50 000 means 1 cm on the map = 50 000 cm (= 500 m = 0.5 km) in real life.</p>
        <div class="key-rule"><strong>Converting Map Distance</strong>Real distance = map distance × scale<br>Map distance = real distance ÷ scale<br>(Watch your units — convert to the same unit first!)</div>
        <div class="example-box">
          <div class="ex-label">Worked Example</div>
          <div class="ex-q">A map has scale 1 : 25 000. Two towns are 8 cm apart on the map. What is the real distance in km?</div>
          <div class="ex-step">Real distance = 8 × 25 000 = 200 000 cm</div>
          <div class="ex-step">Convert: 200 000 ÷ 100 000 = 2 km</div>
          <div class="ex-ans">Answer: 2 km</div>
        </div>`
      }
    ],
    questions:[
      {q:'Two similar rectangles. The small one is 4 cm × 6 cm. The large one has its longer side = 15 cm. What is the shorter side of the large rectangle?',opts:['8 cm','10 cm','12 cm','9 cm'],ans:1,exp:'Scale factor = 15 ÷ 6 = 2.5. Shorter side = 4 × 2.5 = 10 cm.'},
      {q:'A model car is built to a scale of 1 : 20. The model is 22 cm long. How long is the real car in metres?',opts:['3.4 m','4.0 m','4.4 m','4.8 m'],ans:2,exp:'Real length = 22 × 20 = 440 cm = 4.4 m.'},
      {q:'On a map with scale 1 : 50 000, two villages are 6 cm apart. What is the real distance in km?',opts:['2.5 km','3 km','4 km','5 km'],ans:1,exp:'Real distance = 6 × 50 000 = 300 000 cm = 3 km.'},
      {q:'Two similar triangles have a scale factor of 3. The smaller triangle has a base of 8 cm. What is the base of the larger triangle?',opts:['11 cm','18 cm','24 cm','27 cm'],ans:2,exp:'Scale factor 3 means all sides × 3. Base = 8 × 3 = 24 cm.'},
      {q:'A drawing of a room uses scale 1 : 50. A wall measures 7.5 cm on the drawing. How long is the real wall?',opts:['3.5 m','3.75 m','4 m','5 m'],ans:1,exp:'Real length = 7.5 × 50 = 375 cm = 3.75 m.'},
    ]
  },
  {
    id:3,
    icon:'🎯',
    title:'Unequal Sharing & Grouping',
    sub:'Dividing in a given ratio',
    badge:'TOPIC 4',
    desc:'Share quantities in a given ratio and solve grouping problems using ratio thinking.',
    lesson:[
      {
        heading:'Sharing in a Ratio',
        body:`<p>To share an amount in a given ratio, follow three steps every time:</p>
        <div class="key-rule"><strong>The 3-Step Method</strong>1. Add the parts of the ratio → total parts<br>2. Divide the amount by total parts → value of 1 part<br>3. Multiply by each person's share</div>
        <div class="example-box">
          <div class="ex-label">Worked Example</div>
          <div class="ex-q">Share £60 between Amir and Bella in the ratio 2 : 3.</div>
          <div class="ex-step">Total parts = 2 + 3 = 5</div>
          <div class="ex-step">1 part = £60 ÷ 5 = £12</div>
          <div class="ex-step">Amir gets 2 × £12 = £24. Bella gets 3 × £12 = £36.</div>
          <div class="ex-ans">Answer: £24 and £36. Check: 24 + 36 = 60 ✓</div>
        </div>`
      },
      {
        heading:'Three-Way Sharing',
        body:`<p>The same method extends to three people — just add all three parts.</p>
        <div class="example-box">
          <div class="ex-label">Worked Example</div>
          <div class="ex-q">Three friends share prize money of £360 in the ratio 1 : 2 : 3.</div>
          <div class="ex-step">Total parts = 1 + 2 + 3 = 6</div>
          <div class="ex-step">1 part = £360 ÷ 6 = £60</div>
          <div class="ex-step">Shares: £60, £120, £180</div>
          <div class="ex-ans">Check: 60 + 120 + 180 = 360 ✓</div>
        </div>
        <div class="tip-box">Always add up your answers at the end to check they equal the original total!</div>`
      },
      {
        heading:'Finding the Total from One Share',
        body:`<p>Sometimes you're given one person's share and asked for the total or the other share.</p>
        <div class="example-box">
          <div class="ex-label">Worked Example</div>
          <div class="ex-q">Tom and Sara share some money in the ratio 3 : 5. Tom gets £45. How much does Sara get? What was the total?</div>
          <div class="ex-step">Tom's 3 parts = £45, so 1 part = £45 ÷ 3 = £15</div>
          <div class="ex-step">Sara's share = 5 × £15 = £75</div>
          <div class="ex-step">Total = 8 × £15 = £120</div>
          <div class="ex-ans">Sara gets £75. Total = £120.</div>
        </div>`
      }
    ],
    questions:[
      {q:'Share £84 between two people in the ratio 3 : 4. What does the larger share get?',opts:['£36','£42','£48','£56'],ans:2,exp:'Total parts = 7. 1 part = £84 ÷ 7 = £12. Larger share = 4 × £12 = £48.'},
      {q:'Concrete is made from cement, sand and gravel in the ratio 1 : 2 : 4. How much sand is needed to make 140 kg of concrete?',opts:['20 kg','40 kg','60 kg','80 kg'],ans:1,exp:'Total parts = 1 + 2 + 4 = 7. 1 part = 140 ÷ 7 = 20 kg. Sand = 2 × 20 = 40 kg.'},
      {q:'Two sisters share pocket money in the ratio 2 : 5. The younger sister gets £14. How much does the older sister get?',opts:['£30','£35','£40','£45'],ans:1,exp:'2 parts = £14, so 1 part = £7. Older sister = 5 × £7 = £35.'},
      {q:'Three children share 120 stickers in the ratio 1 : 3 : 2. How many stickers does the child with the most get?',opts:['20','40','60','80'],ans:2,exp:'Total parts = 6. 1 part = 20 stickers. Largest share (3 parts) = 3 × 20 = 60.'},
      {q:'A school raises £500. It is split between three clubs in the ratio 2 : 3 : 5. How much does the club with the smallest share receive?',opts:['£75','£90','£100','£110'],ans:2,exp:'Total parts = 10. 1 part = £500 ÷ 10 = £50. Smallest share (2 parts) = 2 × £50 = £100.'},
    ]
  }
];

const state = { current: -1, done: {}, scores: {}, answered: {} };

function buildSidebar(){
  const list = document.getElementById('topicList');
  list.innerHTML = '';
  TOPICS.forEach((t,i) => {
    const div = document.createElement('div');
    div.className = 'topic-item' + (state.current===i?' active':'') + (state.done[i]?' done':'');
    div.innerHTML = `<div class="ti-num">${state.done[i]?'✓':(i+1)}</div>
      <div class="ti-info"><div class="ti-title">${t.title}</div><div class="ti-sub">${t.sub}</div></div>
      ${state.done[i]?'<span class="ti-check">★</span>':''}`;
    div.onclick = () => openTopic(i);
    list.appendChild(div);
  });
  const done = Object.keys(state.done).length;
  document.getElementById('progFill').style.width = (done/TOPICS.length*100)+'%';
  document.getElementById('progTxt').textContent = done+' / '+TOPICS.length;
}

function openTopic(i){
  state.current = i;
  state.answered = {};
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('topicContent').style.display = 'block';
  buildSidebar();
  renderTopic(TOPICS[i]);
  document.getElementById('mainPanel').scrollTop = 0;
}

function renderTopic(t){
  const el = document.getElementById('topicContent');
  let html = `
    <div class="panel-header">
      <div class="topic-badge">${t.icon} ${t.badge}</div>
      <div class="panel-title">${t.title}</div>
      <div class="panel-desc">${t.desc}</div>
    </div>
    <div class="lesson">`;

  t.lesson.forEach(sec => {
    html += `<div class="lesson-section"><h3>${sec.heading}</h3>${sec.body}</div>`;
  });

  html += `</div>
    <div class="quiz-section">
      <div class="quiz-header">
        <h2>Practice Questions</h2>
        <span class="quiz-meta">${t.questions.length} questions</span>
      </div>`;

  t.questions.forEach((q,qi) => {
    html += `<div class="q-card" id="qcard-${qi}">
      <div class="q-num">Question ${qi+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-opts">`;
    q.opts.forEach((opt,j) => {
      html += `<button class="q-btn" id="opt-${qi}-${j}" onclick="answer(${qi},${j})">${opt}</button>`;
    });
    html += `</div>
      <div class="q-feedback" id="fb-${qi}"></div>
      <button class="hint-btn" id="hint-btn-${qi}" onclick="getHint(${qi})">💡 Get a hint from Claude</button>
      <div class="hint-box" id="hint-${qi}"></div>
    </div>`;
  });

  html += `<div class="quiz-score" id="quiz-score">
    <div class="score-circle" id="s-num">0</div>
    <div class="score-msg" id="s-msg"></div>
    <div class="score-btns">
      <button class="btn-primary" onclick="nextTopic()">Next Topic →</button>
      <button class="btn-secondary" onclick="retryQuiz()">Try Again</button>
    </div>
  </div></div>`;

  el.innerHTML = html;
}

function answer(qi, chosen){
  if(state.answered.hasOwnProperty(qi)) return;
  state.answered[qi] = chosen;
  const t = TOPICS[state.current];
  const q = t.questions[qi];
  const correct = (chosen === q.ans);
  document.getElementById('qcard-'+qi).classList.add(correct?'correct':'wrong');
  q.opts.forEach((_,j) => {
    const b = document.getElementById('opt-'+qi+'-'+j);
    b.disabled = true;
    if(j===chosen) b.classList.add(correct?'selected-correct':'selected-wrong');
    if(!correct && j===q.ans) b.classList.add('reveal-correct');
  });
  const fb = document.getElementById('fb-'+qi);
  fb.className = 'q-feedback show '+(correct?'cf':'wf');
  fb.textContent = (correct?'✓ Correct! ':'✗ Not quite. ')+q.exp;
  document.getElementById('hint-btn-'+qi).style.display = correct?'none':'inline-block';
  if(Object.keys(state.answered).length === t.questions.length) showScore();
}

async function getHint(qi){
  const t = TOPICS[state.current];
  const q = t.questions[qi];
  const hintEl = document.getElementById('hint-'+qi);
  const btn = document.getElementById('hint-btn-'+qi);
  btn.disabled = true;
  hintEl.classList.add('show');
  hintEl.innerHTML = '<span class="spinner"></span> Thinking…';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You are a warm, encouraging maths tutor for a 10-year-old called Sacha preparing for his 11+ exam (City of London or Westminster). Explain in 2-3 short, friendly sentences why the correct answer is right and where the student likely went wrong. Use simple language. No markdown, just plain text.`,
        messages:[{role:'user',content:`Question: ${q.q}\nCorrect answer: ${q.opts[q.ans]}\nExplanation: ${q.exp}\n\nPlease give Sacha a friendly hint explaining this.`}]
      })
    });
    const data = await res.json();
    hintEl.textContent = data.content[0].text;
  } catch(e) {
    hintEl.textContent = 'Hint: ' + q.exp;
  }
  btn.disabled = false;
}

function showScore(){
  const t = TOPICS[state.current];
  const score = Object.entries(state.answered).filter(([i,c])=>+c===t.questions[+i].ans).length;
  const pct = score / t.questions.length;
  const msgs = [
    'Keep practising — go back through the lesson and try again!',
    'Getting there! Review the questions you missed and have another go.',
    'Solid work — just a couple to review. You\'re on the right track.',
    'Great score! One more look at your mistakes and you\'ll have it.',
    'Perfect score! Topic mastered! ⭐'
  ];
  document.getElementById('s-num').textContent = score + '/' + t.questions.length;
  document.getElementById('s-msg').textContent = msgs[Math.min(score, 4)];
  document.getElementById('quiz-score').classList.add('show');
  if(pct >= 0.8) state.done[state.current] = true;
  buildSidebar();
  document.getElementById('quiz-score').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function nextTopic(){
  const next = (state.current + 1) % TOPICS.length;
  openTopic(next);
}

function retryQuiz(){
  state.answered = {};
  document.getElementById('quiz-score').classList.remove('show');
  renderTopic(TOPICS[state.current]);
}

buildSidebar();
</script>
</body>
</html>
